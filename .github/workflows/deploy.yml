name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE: uk-retirement-planner


jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── GCP Authentication ──
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Backend: Build & Deploy to Cloud Run ──
      - name: Create Artifact Registry Repository
        run: |
          gcloud artifacts repositories create $SERVICE \
            --repository-format=docker \
            --location=$REGION \
            --description="Docker repository for $SERVICE" \
            || true # Ignore error if it already exists

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Build Docker image
        run: docker build -t $REGION-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/$SERVICE/$SERVICE .

      - name: Push Docker image
        run: docker push $REGION-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/$SERVICE/$SERVICE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $REGION-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/$SERVICE/$SERVICE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1

      # ── Frontend: Build & Deploy to Firebase Hosting ──
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get Cloud Run URL
        id: cloud_run_url
        run: |
          URL=$(gcloud run services describe $SERVICE --region $REGION --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build Frontend
        working-directory: assets
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: ${{ steps.cloud_run_url.outputs.url }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          channelId: live
          projectId: ${{ steps.auth.outputs.project_id }}
