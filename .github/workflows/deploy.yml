name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: uk-retirement-planner

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── GCP Authentication ──
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      # ── Backend: Build & Deploy to Cloud Run ──
      - name: Build Docker image
        run: docker build -t gcr.io/$PROJECT_ID/$SERVICE .

      - name: Push Docker image
        run: docker push gcr.io/$PROJECT_ID/$SERVICE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image gcr.io/$PROJECT_ID/$SERVICE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1

      # ── Frontend: Build & Deploy to Firebase Hosting ──
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get Cloud Run URL
        id: cloud_run_url
        run: |
          URL=$(gcloud run services describe $SERVICE --region $REGION --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build Frontend
        working-directory: assets
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ steps.cloud_run_url.outputs.url }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}
